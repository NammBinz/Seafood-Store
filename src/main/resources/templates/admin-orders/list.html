<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý đơn hàng</h2>

            <span class="badge bg-warning text-dark">
                Đơn chờ xử lý: <span th:text="${pendingCount}"></span>
            </span>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Mã đơn</th>
                    <th>Khách hàng</th>
                    <th>Số điện thoại</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th width="120">Chi tiết</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}"></td>

                    <td th:text="${o.customer.fullName}"></td>

                    <td th:text="${o.customer.phone}"></td>

                    <td th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>

                    <td>
                        <span th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </td>

                    <td>
                        <span th:if="${o.status == 'PENDING'}" class="badge bg-warning text-dark">Chờ xử lý</span>
                        <span th:if="${o.status == 'CONFIRMED'}" class="badge bg-primary">Đã xác nhận</span>
                        <span th:if="${o.status == 'DELIVERING'}" class="badge bg-info">Đang giao</span>
                        <span th:if="${o.status == 'COMPLETED'}" class="badge bg-success">Hoàn thành</span>
                        <span th:if="${o.status == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
                    </td>

                    <td>
                        <a th:href="@{/admin/orders/detail/{id}(id=${o.id})}" class="btn btn-primary btn-sm">
                            Xem
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
