<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card mb-3">
            <div class="card-body">

                <p>
                    <strong>Khách hàng:</strong>
                    <span th:text="${order.customer.fullName}"></span>
                </p>

                <p>
                    <strong>Số điện thoại:</strong>
                    <span th:text="${order.customer.phone}"></span>
                </p>

                <p>
                    <strong>Địa chỉ:</strong>
                    <span th:text="${order.customer.address}"></span>
                </p>

                <p>
                    <strong>Ngày đặt:</strong>
                    <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </p>

                <p>
                    <strong>Tổng tiền:</strong>
                    <span class="text-danger fw-bold">
                        <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </span>
                </p>

                <form th:action="@{/admin/orders/update-status}" method="post" class="row g-2">
                    <!-- Gửi mã đơn hàng về controller, ko hiển thị-->
                    <input type="hidden" name="orderId" th:value="${order.id}">

                    <div class="col-md-4">
                        <select name="status" class="form-select">
                            <option value="PENDING" th:selected="${order.status == 'PENDING'}">Chờ xử lý</option>
                            <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">Đã xác nhận</option>
                            <option value="DELIVERING" th:selected="${order.status == 'DELIVERING'}">Đang giao</option>
                            <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">Hoàn thành</option>
                            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Đã hủy</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success">
                            Cập nhật
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="d : ${details}">
                    <td th:text="${d.productName}"></td>

                    <td>
                        <span th:text="${#numbers.formatDecimal(d.price, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </td>

                    <td th:text="${d.quantity}"></td>

                    <td>
                        <span th:text="${#numbers.formatDecimal(d.subtotal, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/admin/orders}" class="btn btn-secondary">Quay lại</a>

    </div>

</body>

</html>
