<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store</a>

            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý khách hàng</h2>
            <a th:href="@{/customers/add}" class="btn btn-primary">+ Thêm khách hàng</a>
        </div>

        <form th:action="@{/customers}" method="get" class="row mb-3">
            <div class="col-md-10">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm theo tên hoặc số điện thoại..."
                    th:value="${keyword}">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100" type="submit">Tìm kiếm</button>
            </div>
        </form>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Số điện thoại</th>
                    <th>Email</th>
                    <th>Địa chỉ</th>
                    <th>Trạng thái</th>
                    <th width="160">Thao tác</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="c : ${customers}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.fullName}"></td>
                    <td th:text="${c.phone}"></td>
                    <td th:text="${c.email}"></td>
                    <td th:text="${c.address}"></td>
                    <td>
                        <span th:if="${c.status}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${c.status}" class="badge bg-secondary">Ngừng hoạt động</span>
                    </td>
                    <td>
                        <a th:href="@{/customers/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Sửa</a>

                        <a th:href="@{/customers/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Bạn có chắc muốn xóa khách hàng này?')">
                            Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
