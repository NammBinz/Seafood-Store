<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Form sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Hiển thị tên hệ thống Seafood Store.
             Khi bấm vào sẽ về /dashboard-->
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <!--            Các nút đc link tới các trang html tương ứng-->
            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Hiển thị Thêm sản phẩm hoặc Sửa sản phẩm -->
        <h2 th:text="${product.id == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'}"></h2>

        <!-- Khi submit thì form gửi dữ liệu đến /products/save, làm việc với object: "product" -->
        <form th:action="@{/products/save}" th:object="${product}" method="post" class="bg-white p-4 border rounded">

            <!-- Lưu id của sản phẩm nhưng không hiển thị > gửi ngầm về controller -->
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control">
                <div class="text-danger" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Loại hải sản</label>
                <input type="text" th:field="*{type}" class="form-control"
                    placeholder="Ví dụ: Cá biển, Tôm, Mực, Cua ghẹ">
                <div class="text-danger" th:errors="*{type}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Xuất xứ</label>
                <input type="text" th:field="*{origin}" class="form-control"
                    placeholder="Ví dụ: Cà Mau, Nha Trang, Phú Quốc">
            </div>

            <div class="mb-3">
                <label class="form-label">Đơn vị</label>
                <input type="text" th:field="*{unit}" class="form-control" placeholder="kg, con, hộp...">
            </div>

            <div class="mb-3">
                <label class="form-label">Giá bán</label>
                <input type="number" th:field="*{price}" class="form-control">
                <div class="text-danger" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Số lượng</label>
                <input type="number" th:field="*{quantity}" class="form-control">
                <div class="text-danger" th:errors="*{quantity}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Đường dẫn ảnh</label>
                <input type="text"
                       th:field="*{imageUrl}"
                       class="form-control"
                       placeholder="tom-hum.jpg">
                <small class="text-muted">
                    Ảnh cần đặt trong thư mục: static/images/products
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                    <option th:value="true">Đang bán</option>
                    <option th:value="false">Ngừng bán</option>
                </select>
            </div>

            <!-- Nút submit -->
            <button type="submit" class="btn btn-primary">Lưu</button>
            <!-- Nút quay lại trang danh sách sản phẩm: /products -->
            <a th:href="@{/products}" class="btn btn-secondary">Quay lại</a>

        </form>

    </div>

</body>

</html>
