<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm hải sản</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Hiển thị tên hệ thống Seafood Store.
             Khi bấm vào sẽ về /dashboard-->
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <!--            Các nút đc link tới các trang html tương ứng-->
            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý sản phẩm hải sản</h2>
            <a th:href="@{/products/add}" class="btn btn-primary">+ Thêm sản phẩm</a>
            <!-- Khi bấm nút này, trình duyệt đi tới: /products/add
                 > Chạy hàm showAddForm > mở form.html -->
        </div>

        <form th:action="@{/products}" method="get" class="bg-white p-3 border rounded mb-3">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Từ khóa</label>
                    <input type="text" name="keyword" class="form-control" placeholder="Tên hoặc loại hải sản..."
                        th:value="${keyword}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Xuất xứ</label>
                    <input type="text" name="origin" class="form-control" placeholder="Cà Mau, Nha Trang..."
                        th:value="${origin}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Giá từ</label>
                    <input type="number" name="minPrice" class="form-control" placeholder="100000"
                        th:value="${minPrice}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Giá đến</label>
                    <input type="number" name="maxPrice" class="form-control" placeholder="500000"
                        th:value="${maxPrice}">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="" th:selected="${status == null}">Tất cả</option>
                        <option value="true" th:selected="${status == true}">Đang bán</option>
                        <option value="false" th:selected="${status == false}">Ngừng bán</option>
                    </select>
                </div>

                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-success w-100" type="submit">
                        Lọc
                    </button>
                </div>

            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="lowStock" value="true" id="lowStock"
                            th:checked="${lowStock}">
                        <label class="form-check-label" for="lowStock">
                            Sản phẩm sắp hết hàng
                        </label>
                    </div>
                </div>

                <div class="col-md-8 text-end">
                    <a th:href="@{/products}" class="btn btn-secondary">
                        Xóa bộ lọc
                    </a>
                </div>
            </div>

        </form>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên sản phẩm</th>
                    <th>Loại</th>
                    <th>Xuất xứ</th>
                    <th>Đơn vị</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Trạng thái</th>
                    <th width="160">Thao tác</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.type}"></td>
                    <td th:text="${p.origin}"></td>
                    <td th:text="${p.unit}"></td>
                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <!-- price | 0: phần nguyên có tối thiểu 0 chữ số | 'COMMA': dùng dấu , ngăn cách hàng nghìn |
                         0: tự làm tròn phần thập phân | 'POINT': dùng dấu . làm dấu thập phân -->
                    <td th:text="${p.quantity}"></td>
                    <td>
                        <!-- Nếu p.status = true thì hiện: Đang bán-->
                        <span th:if="${p.status}" class="badge bg-success">Đang bán</span>
                        <span th:unless="${p.status}" class="badge bg-secondary">Ngừng bán</span>
                    </td>
                    <td>
                        <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Bạn có chắc muốn ngừng bán sản phẩm này?')">
                            Ngừng bán
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
