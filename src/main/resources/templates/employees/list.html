<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Hiển thị tên hệ thống Seafood Store.
             Khi bấm vào sẽ về /dashboard-->
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <!--            Các nút đc link tới các trang html tương ứng-->
            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Quản lý nhân viên</h2>
            <a th:href="@{/employees/add}" class="btn btn-primary">+ Thêm nhân viên</a>
        </div>

        <div class="mb-3">
            <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">Quản lý sản phẩm</a>
            <a th:href="@{/employees}" class="btn btn-outline-secondary btn-sm">Quản lý nhân viên</a>
        </div>

        <form th:action="@{/employees}" method="get" class="row mb-3">
            <div class="col-md-10">
                <input type="text" name="keyword" class="form-control"
                    placeholder="Tìm theo tên, số điện thoại hoặc chức vụ..." th:value="${keyword}">
            </div>

            <div class="col-md-2">
                <button class="btn btn-success w-100" type="submit">Tìm kiếm</button>
            </div>
        </form>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Giới tính</th>
                    <th>Ngày sinh</th>
                    <th>Số điện thoại</th>
                    <th>Email</th>
                    <th>Chức vụ</th>
                    <th>Lương</th>
                    <th>Trạng thái</th>
                    <th width="160">Thao tác</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="e : ${employees}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.fullName}"></td>
                    <td th:text="${e.gender}"></td>
                    <td th:text="${#temporals.format(e.birthday, 'dd-MM-yyyy')}"></td>
                    <td th:text="${e.phone}"></td>
                    <td th:text="${e.email}"></td>
                    <td th:text="${e.position}"></td>
                    <td th:text="${#numbers.formatDecimal(e.salary, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <td>
                        <span th:if="${e.status}" class="badge bg-success">Đang làm</span>
                        <span th:unless="${e.status}" class="badge bg-secondary">Đã nghỉ</span>
                    </td>
                    <td>
                        <a th:href="@{/employees/edit/{id}(id=${e.id})}" class="btn btn-warning btn-sm">Sửa</a>
                        <a th:href="@{/employees/delete/{id}(id=${e.id})}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Bạn có chắc muốn xóa nhân viên này?')">
                            Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>
