<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Form nhân viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Hiển thị tên hệ thống Seafood Store.
             Khi bấm vào sẽ về /dashboard-->
            <a class="navbar-brand" th:href="@{/dashboard}">Seafood Store Admin</a>

            <!--            Các nút đc link tới các trang html tương ứng-->
            <div>
                <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a th:href="@{/products}" class="btn btn-outline-light btn-sm">Sản phẩm</a>
                <a th:href="@{/employees}" class="btn btn-outline-light btn-sm">Nhân viên</a>
                <a th:href="@{/customers}" class="btn btn-outline-light btn-sm">Khách hàng</a>
                <a th:href="@{/admin/orders}" class="btn btn-outline-light btn-sm">Đơn hàng</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm">Đăng xuất</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 th:text="${employee.id == null ? 'Thêm nhân viên' : 'Sửa nhân viên'}"></h2>

        <form th:action="@{/employees/save}" th:object="${employee}" method="post" class="bg-white p-4 border rounded">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" th:field="*{fullName}" class="form-control">
                <div class="text-danger" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Giới tính</label>
                <select th:field="*{gender}" class="form-select">
                    <option value="">-- Chọn giới tính --</option>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" th:field="*{birthday}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" th:field="*{phone}" class="form-control">
                <div class="text-danger" th:errors="*{phone}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control">
                <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <input type="text" th:field="*{address}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Chức vụ</label>
                <input type="text" th:field="*{position}" class="form-control"
                    placeholder="Ví dụ: Quản lý, Thu ngân, Nhân viên bán hàng">
                <div class="text-danger" th:errors="*{position}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Lương</label>
                <input type="number" th:field="*{salary}" class="form-control">
                <div class="text-danger" th:errors="*{salary}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                    <option th:value="true">Đang làm</option>
                    <option th:value="false">Đã nghỉ</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/employees}" class="btn btn-secondary">Quay lại</a>

        </form>

    </div>

</body>

</html>
