<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hải Sản Tươi Ngon</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <img th:src="@{/images/logo.png}"
                     alt="Logo Hải Sản"
                     class="navbar-logo">
                <span class="logo-text">Hải Sản <strong>Tươi Ngon</strong></span>
            </a>

            <div class="ms-auto">
                <a th:href="@{/}" class="btn btn-outline-custom btn-sm">Trang chủ</a>
                <a th:href="@{/shop}" class="btn btn-outline-custom btn-sm">Cửa hàng</a>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay"></div>

        <div class="container position-relative" style="z-index: 2;">
            <div class="row min-vh-100 align-items-center justify-content-center">

                <div class="col-lg-5 col-md-8">

                    <div class="card border-0 shadow-lg rounded-custom">
                        <div class="card-body p-4 p-md-5">

                            <div class="text-center mb-4">
                                <img th:src="@{/images/logo-auth.png}"
                                     alt="Logo Hải Sản"
                                     class="auth-logo login-logo">                                <h3 class="section-title mb-1">Đăng nhập</h3>
                                <p class="text-muted mb-0">Vào hệ thống quản lý và mua hải sản</p>
                            </div>

                            <div th:if="${param.error}" class="alert alert-danger">
                                Sai tên đăng nhập hoặc mật khẩu!
                            </div>

                            <div th:if="${param.logout}" class="alert alert-success">
                                Đăng xuất thành công!
                            </div>

                            <div th:if="${param.registerSuccess}" class="alert alert-success">
                                Đăng ký tài khoản thành công! Vui lòng đăng nhập.
                            </div>

                            <form th:action="@{/login}" method="post">

                                <div class="mb-3">
                                    <label class="form-label">Tên đăng nhập</label>
                                    <input type="text" name="username" class="form-control" placeholder="Nhập username"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu</label>
                                    <input type="password" name="password" class="form-control"
                                        placeholder="Nhập mật khẩu" required>
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100 mt-2">
                                    Đăng nhập
                                </button>

                            </form>

                            <div class="text-center mt-4">
                                <span class="text-muted">Chưa có tài khoản?</span>
                                <a th:href="@{/register}" class="fw-bold text-decoration-none">
                                    Đăng ký khách hàng
                                </a>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>

</html>
