<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khách hàng - Hải Sản Tươi Ngon</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
                <img th:src="@{/images/logo.png}"
                     alt="Logo Hải Sản"
                     class="navbar-logo">
                <span class="logo-text">Hải Sản <strong>Tươi Ngon</strong></span>
            </a>

            <div class="ms-auto">
                <a th:href="@{/}" class="btn btn-outline-custom btn-sm">Trang chủ</a>
                <a th:href="@{/login}" class="btn btn-dat-ban btn-sm">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-overlay"></div>

        <div class="container position-relative" style="z-index: 2;">
            <div class="row min-vh-100 align-items-center justify-content-center py-5">

                <div class="col-lg-7 col-md-9">

                    <div class="card border-0 shadow-lg rounded-custom">
                        <div class="card-body px-5 pb-4 pt-0">

                            <div class="text-center mb-4">
                                <img th:src="@{/images/logo-auth.png}"
                                     alt="Logo Hải Sản"
                                     class="auth-logo register-logo">                                <h3 class="section-title mb-1">Đăng ký khách hàng</h3>
                                <p class="text-muted mb-0">Tạo tài khoản để mua hải sản trực tuyến</p>
                            </div>

                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                            <form th:action="@{/register}" method="post">

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">Họ tên</label>
                                        <input type="text" name="fullName" class="form-control"
                                            placeholder="Nguyễn Văn A" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Số điện thoại</label>
                                        <input type="text" name="phone" class="form-control" maxlength="10"
                                            pattern="0[0-9]{9}" placeholder="0912345678" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Email</label>
                                        <input type="email" name="email" class="form-control"
                                            placeholder="email@gmail.com">
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Địa chỉ</label>
                                        <input type="text" name="address" class="form-control"
                                            placeholder="Hà Nội, TP.HCM...">
                                    </div>

                                </div>

                                <hr class="my-4">

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label class="form-label">Tên đăng nhập</label>
                                        <input type="text" name="username" class="form-control"
                                            placeholder="khachhang123" required>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label">Mật khẩu</label>
                                        <input type="password" name="password" class="form-control"
                                            placeholder="Tối thiểu 6 ký tự" minlength="6" required>
                                    </div>

                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100 mt-4">
                                    Đăng ký và mua hàng
                                </button>

                            </form>

                            <div class="text-center mt-4">
                                <span class="text-muted">Đã có tài khoản?</span>
                                <a th:href="@{/login}" class="fw-bold text-decoration-none">
                                    Đăng nhập ngay
                                </a>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>

</body>

</html>
